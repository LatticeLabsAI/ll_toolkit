name: cadling
channels:
  - conda-forge
  - defaults

dependencies:
  # Python
  - python>=3.9

  # CAD processing (conda-only dependencies)
  - pythonocc-core=>7.8.0

  # Core dependencies
  - numpy>=1.24,<2.0
  - pillow>=10.0
  - networkx>=3.0

  # Scientific computing
  - scipy>=1.10
  - scikit-learn>=1.3

  # ML dependencies (conda-only to avoid OpenMP conflicts on macOS)
  - pytorch>=2.0
  - torchvision
  - torchaudio
  - torch-geometric>=2.4
  # NOTE: PyG extension packages (torch-scatter, torch-sparse, torch-cluster)
  # are optional in PyG >=2.4 — it falls back to native PyTorch ops.
  # They're on the 'pyg' channel, not conda-forge, and lack osx-arm64 builds.
  # To install them for performance on linux-64/CUDA, run:
  #   conda install pytorch-scatter pytorch-sparse pytorch-cluster -c pyg

  # Development tools
  - pytest>=7.0
  - pytest-cov>=4.0
  - black>=23.0
  - mypy>=1.0
  - ipython
  - jupyter
  - notebook

  # Pip dependencies (not available in conda or better from pip)
  - pip
  - pip:
      # Core
      - pydantic>=2.0,<3.0
      - typing-extensions>=4.0
      - rich>=13.0

      # CAD processing
      - numpy-stl>=3.0
      - trimesh>=4.0

      # Development
      - pytest-xdist>=3.0
      - ruff>=0.1
      - pre-commit>=3.0

      # Vision
      - transformers>=4.35
      - easyocr>=1.7
      - opencv-python>=4.8

      # HuggingFace Hub & Dataset streaming
      - huggingface-hub>=0.20.0
      - datasets>=2.16.0
      - pyarrow>=14.0.0

      # Local packages (installed in development mode)
      - -e ./ll_stepnet
      - -e ./cadling
      - -e ./geotoken
