name: cadling
channels:
  - conda-forge
  - defaults

dependencies:
  # Python
  - python>=3.9

  # CAD processing (conda-only dependencies)
  - pythonocc-core=>7.8.0

  # Core dependencies
  - numpy>=1.24,<2.0
  - pillow>=10.0
  - networkx>=3.0

  # Scientific computing
  - scipy>=1.10

  # ML dependencies (conda-only to avoid OpenMP conflicts on macOS)
  - pytorch>=2.0
  - torchvision
  - torchaudio
  - torch-geometric

  # Development tools
  - pytest>=7.0
  - pytest-cov>=4.0
  - black>=23.0
  - mypy>=1.0
  - ipython
  - jupyter
  - notebook

  # Pip dependencies (not available in conda or better from pip)
  - pip
  - pip:
      # Core
      - pydantic>=2.0,<3.0
      - typing-extensions>=4.0
      - rich>=13.0

      # CAD processing
      - numpy-stl>=3.0
      - trimesh>=4.0

      # Development
      - pytest-xdist>=3.0
      - ruff>=0.1
      - pre-commit>=3.0

      # Vision
      - transformers>=4.35
      - easyocr>=1.7
      - opencv-python>=4.8

      # Local packages (installed in development mode)
      - -e ../ll_stepnet
      - -e .
